services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:${STIRLING_PDF_VERSION:-latest}
    container_name: stirling-pdf
    volumes:
      - ${STIRLING_CONFIG_FOLDER:-./configs}:/configs
      - ${STIRLING_LOGS_FOLDER:-./logs}:/logs
      - ${TESSERACT_OCR_DATA_FOLDER:-/usr/share/tessdata}:/usr/share/tessdata
    environment:
      - SECURITY_ENABLELOGIN=true    # Set true to enable user authentication
      - LANGS=pt_BR
    restart: unless-stopped
    networks:
      external:
        ipv4_address: ${STIRLING_PDF_IP_ADDRESS}

networks:
  external:
    external: true
    name: ${EXTERNAL_NETWORK_NAME}